name: Daily AI Blog Post

on:
  schedule:
    # Runs every day at 9:00 AM UTC
    - cron: "0 9 * * *"
  # Allows manual trigger from the GitHub Actions tab for testing
  workflow_dispatch:


jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to git push back to the repo
    outputs:
      post_generated: ${{ steps.commit_push.outputs.post_generated }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install --quiet \
            google-genai \
            feedparser \
            python-slugify \
            seleniumbase
          seleniumbase get chromium

      - name: Verify API key is set
        run: |
          if [ -z "$GM_API_KEY" ]; then
            echo "ERROR: GM_API_KEY secret is not set in GitHub Repository Secrets."
            echo "Go to Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi
          echo "API key confirmed present."
        env:
          GM_API_KEY: ${{ secrets.GM_API_KEY }}

      - name: Run Blog Generator
        env:
          GM_API_KEY: ${{ secrets.GM_API_KEY }}
        run: python scripts/auto_blog.py

      - name: Commit and push new post
        id: commit_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/posts/
          if git diff --staged --quiet; then
            echo "No new post generated. Nothing to commit."
            echo "post_generated=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(content): auto-generate daily blog post"
            git push
            echo "post_generated=true" >> $GITHUB_OUTPUT
          fi

  deploy_to_firebase:
    needs: generate-blog-post
    if: needs.generate-blog-post.outputs.post_generated == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHILDCARE_BP }}'
          channelId: live
          projectId: childcare-bp
