name: Daily AI Blog Post

on:
  schedule:
    # Runs every day at 9:00 AM UTC
    - cron: "0 9 * * *"
  # Allows manual trigger from the GitHub Actions tab for testing
  workflow_dispatch:

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to git push back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so the bot can push commits
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            google-genai \
            feedparser \
            python-slugify

      - name: Run Blog Generator
        env:
          GM_API_KEY: ${{ secrets.GM_API_KEY }}
        run: python scripts/auto_blog.py

      - name: Commit and push new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/posts/
          # Only commit if there's actually a new file
          if git diff --staged --quiet; then
            echo "No new post generated. Nothing to commit."
          else
            git commit -m "chore(content): auto-generate daily blog post [skip ci]"
            git push
          fi
